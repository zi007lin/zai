name: ZiLin Queue Listener

on:
  repository_dispatch:
    types: [zilin_impl]

jobs:
  impl:
    runs-on: [self-hosted, contabo, zilin, zai]
    timeout-minutes: 60
    env:
      # Per-repo dispatch-mode flags. Unset -> legacy (existing in-place behavior).
      # Source of truth: repository variables on zi007lin/zai.
      # See docs/router-dispatch-contract.md#mode-resolution.
      ZAI_DISPATCH_MODE_STREETTT: ${{ vars.ZAI_DISPATCH_MODE_STREETTT }}
      ZAI_DISPATCH_MODE_HTU_IO: ${{ vars.ZAI_DISPATCH_MODE_HTU_IO }}
      ZAI_DISPATCH_MODE_HTU_FOUNDATION: ${{ vars.ZAI_DISPATCH_MODE_HTU_FOUNDATION }}
      ZAI_DISPATCH_MODE_NYQEX: ${{ vars.ZAI_DISPATCH_MODE_NYQEX }}
      ZAI_DISPATCH_MODE_ZAI: ${{ vars.ZAI_DISPATCH_MODE_ZAI }}
    steps:
      - name: Ensure Claude Code CLI on PATH
        run: |
          # Systemd services don't source ~/.bashrc; if the unit file is missing
          # Environment="HOME=..." then $HOME is empty and PATH expansion breaks.
          if [ -z "$HOME" ]; then
            HOME="$(getent passwd "$(id -un)" | cut -d: -f6)"
            export HOME
            echo "::warning::HOME was unset; derived HOME=$HOME"
          fi
          export PATH="$HOME/.npm-global/bin:$HOME/.local/bin:$PATH"
          if ! command -v claude >/dev/null 2>&1; then
            echo "::warning::claude CLI missing on runner; installing"
            npm config set prefix "$HOME/.npm-global"
            npm install -g @anthropic-ai/claude-code
          fi
          claude --version
          {
            echo "HOME=$HOME"
            echo "PATH=$HOME/.npm-global/bin:$HOME/.local/bin:$PATH"
          } >> "$GITHUB_ENV"

      - name: Resolve target repo and mode
        id: resolve
        env:
          GITHUB_TOKEN: ${{ secrets.ZZV_DISPATCH_TOKEN }}
          PAYLOAD_JSON: ${{ toJSON(github.event.client_payload) }}
        run: |
          set -euo pipefail

          ISSUE_NUMBER="${{ github.event.client_payload.issue_number }}"
          if [ -z "$ISSUE_NUMBER" ]; then
            echo "::error::issue_number not provided in client_payload"
            exit 1
          fi

          TARGET_REPO="${{ github.event.client_payload.target_repo }}"
          MATCHED_ALIAS=""
          SPEC_BODY=""

          if [ -z "$TARGET_REPO" ]; then
            echo "client_payload.target_repo not set; parsing header labels from issue body"
            SPEC_BODY=$(gh issue view "$ISSUE_NUMBER" --repo "${{ github.repository }}" --json body -q .body)

            # Accepted header labels, canonical first. Case-insensitive.
            # See docs/PROCEDURES/spec-header-conventions.md.
            LABEL_NAMES=(
              "Repo"
              "Target repo"
              "Target"
              "Canonical repo"
              "For repo"
            )
            for LABEL in "${LABEL_NAMES[@]}"; do
              ESC=$(printf '%s' "$LABEL" | sed 's/[][\.*^$/]/\\&/g')
              CANDIDATE=$(printf '%s' "$SPEC_BODY" \
                | grep -oiE "\*\*${ESC}:\*\*[[:space:]]+\`?[A-Za-z0-9_.-]+/[A-Za-z0-9_.-]+\`?" \
                | head -1 \
                | sed -E 's/^\*\*[^*]+\*\*[[:space:]]+//; s/^`//; s/`$//' \
                || true)
              if [ -n "$CANDIDATE" ]; then
                TARGET_REPO="$CANDIDATE"
                MATCHED_ALIAS="$LABEL"
                break
              fi
            done

            if [ -n "$MATCHED_ALIAS" ] && [ "$MATCHED_ALIAS" != "Repo" ]; then
              echo "::warning::Resolved target_repo via alias header '**${MATCHED_ALIAS}:**'. Prefer the canonical '**Repo:**' form. See docs/PROCEDURES/spec-header-conventions.md."
            fi
          fi

          if [ -z "$TARGET_REPO" ]; then
            # Diagnostic block — emit BEFORE ::error:: so it is visible in the log.
            {
              echo ""
              echo "======================================================================"
              echo "RESOLVE target_repo FAILED"
              echo "======================================================================"
              echo ""
              echo "Tried:"
              echo "  client_payload.target_repo       -> empty"
              echo "  regex on issue body              -> no match"
              echo ""
              echo "Expected one of these header labels in the issue body:"
              echo "  **Repo:** <owner>/<name>          (canonical)"
              echo "  **Target repo:** <owner>/<name>"
              echo "  **Target:** <owner>/<name>"
              echo "  **Canonical repo:** <owner>/<name>"
              echo "  **For repo:** <owner>/<name>"
              echo ""
              echo "Issue body - first 10 lines:"
              if [ -n "$SPEC_BODY" ]; then
                printf '%s\n' "$SPEC_BODY" | head -10 | awk '{printf "  %2d: %s\n", NR, $0}'
              else
                echo "  (issue body was not fetched)"
              fi
              echo ""
              echo "client_payload keys present:"
              KEYS=$(printf '%s' "$PAYLOAD_JSON" | jq -r 'keys | join(", ")' 2>/dev/null || echo "(unparseable)")
              echo "  ${KEYS:-(none)}"
              echo ""
              echo "Next step:"
              echo "  Add or fix the header label, then re-dispatch. See"
              echo "  docs/PROCEDURES/spec-header-conventions.md for canonical form."
              echo "======================================================================"
              echo ""
            } >&2
            echo "::error::could not resolve target_repo from payload or spec body (see diagnostic block above)"
            exit 1
          fi

          # Allow-list. Edits to this case statement require a dual-PR merge on
          # zi007lin/zai (daniel-silvers approves). See docs/router-dispatch-contract.md#allow-list.
          case "$TARGET_REPO" in
            zi007lin/streettt|zi007lin/htu.io|zi007lin/nyqex|zi007lin/htu-foundation|zi007lin/zai)
              ;;
            *)
              echo "::error::target_repo $TARGET_REPO not in allow-list"
              exit 1
              ;;
          esac

          REPO_NAME="${TARGET_REPO##*/}"
          SLUG="${REPO_NAME^^}"
          SLUG="${SLUG//./_}"
          SLUG="${SLUG//-/_}"
          MODE_VAR="ZAI_DISPATCH_MODE_${SLUG}"
          RAW_MODE="${!MODE_VAR:-}"
          if [ "$RAW_MODE" = "dispatch" ]; then
            MODE="dispatch"
          else
            MODE="legacy"
          fi

          echo "Resolved: target_repo=$TARGET_REPO slug=$SLUG mode=$MODE (raw=${RAW_MODE:-unset})"
          {
            echo "target_repo=$TARGET_REPO"
            echo "mode=$MODE"
            echo "issue_number=$ISSUE_NUMBER"
          } >> "$GITHUB_OUTPUT"
          {
            echo "ISSUE_NUMBER=$ISSUE_NUMBER"
            echo "TARGET_REPO=$TARGET_REPO"
            echo "DISPATCH_MODE=$MODE"
            echo "SPEC_TYPE=${{ github.event.client_payload.spec_type }}"
            echo "SPEC_PATH=${{ github.event.client_payload.spec_path }}"
          } >> "$GITHUB_ENV"

      - name: Dispatch to target repo (dispatch mode)
        id: dispatch
        if: steps.resolve.outputs.mode == 'dispatch'
        env:
          GITHUB_TOKEN: ${{ secrets.ZZV_DISPATCH_TOKEN }}
        run: |
          set -euo pipefail
          TARGET="${{ steps.resolve.outputs.target_repo }}"
          ISSUE_NUMBER="${{ steps.resolve.outputs.issue_number }}"
          SOURCE_RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          SPEC_PATH="${{ github.event.client_payload.spec_path }}"
          SPEC_TYPE="${{ github.event.client_payload.spec_type }}"
          NEEDS_APPROVAL="${{ github.event.client_payload.needs_approval }}"

          PAYLOAD=$(jq -nc \
            --argjson issue "$ISSUE_NUMBER" \
            --arg target "$TARGET" \
            --arg spec_path "$SPEC_PATH" \
            --arg spec_type "$SPEC_TYPE" \
            --arg needs_approval "$NEEDS_APPROVAL" \
            --arg source_run "$SOURCE_RUN_URL" \
            '{
              event_type: "zilin-impl",
              client_payload: {
                issue_number: $issue,
                target_repo: $target,
                spec_path: $spec_path,
                spec_type: $spec_type,
                needs_approval: ($needs_approval == "true"),
                source_zai_run_url: $source_run
              }
            }')

          echo "Dispatching zilin-impl to $TARGET for issue #$ISSUE_NUMBER"
          printf '%s' "$PAYLOAD" | gh api "repos/$TARGET/dispatches" --input -
          echo "Dispatched: https://github.com/$TARGET/actions"

      - name: Legacy in-place execute (legacy mode)
        id: legacy
        if: steps.resolve.outputs.mode == 'legacy'
        env:
          GITHUB_TOKEN: ${{ secrets.ZZV_DISPATCH_TOKEN }}
        run: |
          set -euo pipefail
          ISSUE_NUMBER="${{ steps.resolve.outputs.issue_number }}"
          TARGET="${{ steps.resolve.outputs.target_repo }}"
          echo "Routing implw $ISSUE_NUMBER for $TARGET (legacy mode)"
          cd "$ROUTER_PATH"
          claude -p "implw $ISSUE_NUMBER --repo $TARGET"

      - name: Compute resolution
        if: always()
        run: |
          if [ "${{ steps.resolve.outcome }}" != "success" ]; then
            RESOLUTION="needs_input"
          elif [ "${{ steps.dispatch.outcome }}" = "success" ]; then
            RESOLUTION="dispatched"
          elif [ "${{ steps.legacy.outcome }}" = "success" ]; then
            RESOLUTION="self-executed"
          else
            RESOLUTION="failed"
          fi
          echo "RESOLUTION=$RESOLUTION" >> "$GITHUB_ENV"

      - name: Summary
        if: always()
        run: |
          {
            echo "## ZAI router summary"
            echo ""
            echo "| Field | Value |"
            echo "|---|---|"
            echo "| Issue | #${ISSUE_NUMBER:-unresolved} |"
            echo "| Target repo | ${TARGET_REPO:-unresolved} |"
            echo "| Spec type | ${SPEC_TYPE:-} |"
            echo "| Dispatch mode | ${DISPATCH_MODE:-unresolved} |"
            echo "| Spec path | ${SPEC_PATH:-} |"
            echo "| Dispatched at | $(date -u +%FT%TZ) |"
            echo "| Resolution | ${RESOLUTION:-needs_input} |"
          } >> "$GITHUB_STEP_SUMMARY"
